<!doctype html>
<html lang="de" id="top">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Videos – Kinnicher FFC</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="manifest" href="manifest.json">
  <style>
    :root{
      --bg:#071428;
      --card:#0c1f3b;
      --card2:#0a1830;
      --text:#eaf2ff;
      --muted:#b9c8e6;
      --line:rgba(255,255,255,.12);
      --accent:#3aa0ff;
      --accent2:#79d4ff;
      --shadow: 0 18px 60px rgba(0,0,0,.35);
      --radius:18px;
      --max:1100px;
      --headerH: 120px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Helvetica Neue", Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 12% 10%, rgba(58,160,255,.18), transparent 60%),
        radial-gradient(700px 420px at 85% 10%, rgba(121,212,255,.12), transparent 55%),
        radial-gradient(900px 600px at 40% 110%, rgba(58,160,255,.10), transparent 60%),
        linear-gradient(180deg, #061126 0%, #050b18 100%);
    }
    a{color:inherit}
    .wrap{max-width:var(--max); margin:0 auto; padding:0 18px}

    section{scroll-margin-top: calc(var(--headerH) + 16px); padding:20px 0}

    /* Header */
    .header{
      position:sticky; top:0; z-index:50;
      backdrop-filter: blur(10px);
      background: rgba(5,11,24,.62);
      border-bottom:1px solid var(--line);
    }
    .bar{
      display:flex; align-items:center; justify-content:space-between;
      gap:14px; padding:12px 0;
      min-height: var(--headerH);
    }

    .brand{display:flex; align-items:center; gap:10px; min-width: 240px}
    .logo{      
  width:88px;
  height:88px;
  border-radius:22px;
  background: linear-gradient(135deg, rgba(58,160,255,.25), rgba(121,212,255,.15));
  border:1px solid var(--line);
  display:grid;
  place-items:center;
  box-shadow: 0 10px 30px rgba(0,0,0,.35);
  flex:0 0 auto;
  overflow:hidden;
} 
    .logo img{
      width:100%; height:100%;
      object-fit:contain;
      display:block;
        padding:10px;
    }
    .logo.fallback{font-size:18px}

    .brand h1{font-size:18px; margin:0; line-height:1.2}
    .brand span{display:block; font-size:14px; color:var(--muted)}
    nav{display:flex; align-items:center; gap:10px}
    .navlinks{display:flex; gap:10px; align-items:center}
    .navlinks a{
      text-decoration:none;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid transparent;
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
    }
    .navlinks a:hover{border-color:var(--line); color:var(--text); background:rgba(255,255,255,.04)}
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      gap:8px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      text-decoration:none;
      font-size:13px;
      color:var(--text);
      cursor:pointer;
    }
    .btn:hover{background:rgba(255,255,255,.07)}

    /* Footer */
    footer{
      margin-top:30px;
      border-top:1px solid var(--line);
      background: rgba(5,11,24,.55);
    }
    .footerGrid{
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap:18px;
      padding:18px 0;
      align-items:start;
    }
    .footLinks{display:flex; flex-wrap:wrap; gap:10px}
    .copy{color:var(--muted); font-size:12px; margin-top:10px}

    /* Sections */
    .sectionHead{
      display:flex; align-items:flex-end; justify-content:space-between; gap:12px;
      margin:0 0 12px;
    }
    .sectionHead h2{margin:0; font-size:18px}
    .grid2{display:grid; grid-template-columns:1fr 1fr; gap:18px}
    .pad{padding:18px}
    .muted{color:var(--muted)}
    .card{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:rgba(255,255,255,.04);
      padding:18px;
      margin-bottom:18px;
    }

    /* Responsive */
    @media (max-width: 940px){
      .grid2{grid-template-columns:1fr}
    }
    @media (max-width: 860px){
      .navlinks{display:none}
      .burger{display:inline-flex; align-items:center; justify-content:center}
      .mobilemenu{display:none}
      .brand{min-width:auto}
    }
    @media (max-width: 520px){
      .footerGrid{grid-template-columns:1fr}
    }
    @media (max-width: 520px){
  :root{ --headerH: 96px; }

  .logo{
    width:64px;
    height:64px;
    border-radius:18px;
  }
}
  </style>
</head>
<body>
  <header class="header">
    <div class="wrap">
      <div class="bar">
        <div class="brand">
          <div class="logo" aria-hidden="true">
           <img src="assets/logo-loewe.png" alt="Löwe Logo" onerror="this.remove(); this.parentElement.classList.add('fallback'); this.parentElement.textContent='🦁';">

          </div>
          <div>
            <h1>Kinnicher Fussball Fanclub 2024 e.V.</h1>
            <span>Bad König · Blau/Weiß</span>
          </div>
        </div>

        <nav aria-label="Hauptnavigation">
          <div class="navlinks">
            <a href="index.html">← Zur Startseite</a>
          </div>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <div class="wrap">
      <section id="videos">
        <div class="sectionHead">
          <h2>Videos</h2>
        </div>
        <div class="card pad">
          <p class="muted">Hier findest du unsere neuesten Videos.</p>
          <!-- Video Inhalte hier einfügen -->
        </div>
      </section>
    </div>
  </main>

  <footer>
    <div class="wrap">
      <div class="footerGrid">
        <div>
          <div class="footLinks">
            <a href="legal.html">Impressum & Datenschutz</a>
            <a href="membership.html">Mitgliedsantrag</a>
            <a href="members.html">Mitgliederbereich</a>
          </div>
          <div class="copy">© 2026 Kinnicher FFC. Alle Rechte vorbehalten.</div>
        </div>
        <div>
          <p class="muted">Bleib auf dem Laufenden!</p>
          <div class="footLinks">
            <a href="https://whatsapp.com/channel/0029VaMg8M11t90lH7MP9n20" target="_blank" rel="noopener">WhatsApp</a>
            <a href="https://www.instagram.com/kinnicher_ffc/" target="_blank" rel="noopener">Instagram</a>
            <a href="https://www.facebook.com/profile.php?id=61574762261698" target="_blank" rel="noopener">Facebook</a>
            <a href="https://www.youtube.com/@KinnicherFFC" target="_blank" rel="noopener">YouTube</a>
          </div>
        </div>
      </div>
    </div>
  </footer>
</body>
</html>
