<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mitgliedsantrag – Kinnicher FFC</title>
  <style>
    :root{--bg:#071428; --text:#eaf2ff; --muted:#b9c8e6; --line:rgba(255,255,255,.12); --radius:18px;}
    *{box-sizing:border-box}
    body{
      margin:0; color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Helvetica Neue", Helvetica, sans-serif;
      background: linear-gradient(180deg, #061126 0%, #050b18 100%);
    }
    .wrap{max-width:860px; margin:0 auto; padding:22px 18px}
    .card{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:rgba(255,255,255,.04);
      padding:18px;
      margin-top:14px;
    }
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      padding:10px 12px; border-radius:14px;
      border:1px solid var(--line); background:rgba(255,255,255,.04);
      text-decoration:none; font-size:13px; color:var(--text);
      cursor:pointer;
    }
    .btn:hover{background:rgba(255,255,255,.07)}
    p{color:var(--muted); line-height:1.65; font-size:14px; margin:8px 0}
    .captcha{display:none}
    @media (min-width: 769px){
      .captcha{display:block}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <a class="btn" href="index.html">← Zur Startseite</a>
      <a class="btn" href="legal.html">Impressum & Datenschutz</a>
    </div>

    <div class="card">
      <h1 style="margin:0; font-size:18px">Online-Mitgliedsantrag</h1>
      <p>
        Fülle das Formular aus, um Mitglied zu werden.
      </p>

      <div class="captcha">
        <p>Bitte löse das Captcha: Was ist 2 + 3?</p>
        <input type="text" id="captchaInput" placeholder="Antwort">
        <button class="btn" onclick="checkCaptcha()">Überprüfen</button>
      </div>

      <iframe id="formIframe" src="https://formular.vereinsplaner.com/embed/1e679e4f-42ba-487a-a463-ba000f6b972c" style="width: 100%; height: 600px; border: none; display:none"></iframe>
    </div>
  </div>

  <script>
    function checkCaptcha() {
      const input = document.getElementById('captchaInput').value;
      if (input === '5') {
        document.getElementById('formIframe').style.display = 'block';
        document.querySelector('.captcha').style.display = 'none';
      } else {
        alert('Falsche Antwort!');
      }
    }
    if (window.innerWidth <= 768) {
      document.getElementById('formIframe').style.display = 'block';
      document.querySelector('.captcha').style.display = 'none';
    }
  </script>
</body>
</html>
