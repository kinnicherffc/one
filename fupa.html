<!doctype html> 
<html lang="de" id="top">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FuPa Widgets | Kinnicher FFC</title>

  <style>
    :root{
      --bg:#071428;
      --card:#0c1f3b;
      --text:#eaf2ff;
      --muted:#b9c8e6;
      --line:rgba(255,255,255,.12);
      --accent:#3aa0ff;
      --shadow:0 18px 60px rgba(0,0,0,.35);
      --radius:18px;
      --max:1200px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 12% 10%, rgba(58,160,255,.18), transparent 60%),
        radial-gradient(700px 420px at 85% 10%, rgba(121,212,255,.12), transparent 55%),
        linear-gradient(180deg, #061126 0%, #050b18 100%);
    }

    a{color:inherit}

    .wrap{
      max-width:var(--max);
      margin:0 auto;
      padding:18px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:16px;
    }

    h1{
      margin:0;
      font-size:20px;
    }

    p{
      margin:6px 0 0;
      color:var(--muted);
      line-height:1.6;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:11px 16px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:
        linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.04));
      color:var(--text);
      text-decoration:none;
      font-size:14px;
      font-weight:600;
      letter-spacing:.2px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        0 8px 24px rgba(0,0,0,.22);
      transition:transform .18s ease, background .18s ease, border-color .18s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      border-color:rgba(58,160,255,.45);
      background:
        linear-gradient(180deg, rgba(58,160,255,.20), rgba(255,255,255,.05));
    }

    .back-btn{
      white-space:nowrap;
    }

    .hero{
      border:1px solid var(--line);
      background:rgba(12,31,59,.68);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:18px;
    }

    .hero-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .hero-actions .btn{
      min-width:140px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:18px;
    }

    .card{
      border:1px solid var(--line);
      background:rgba(12,31,59,.68);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      padding:14px;
      scroll-margin-top:18px;
      min-width:0;
    }

    .card h2{
      margin:0 0 8px;
      font-size:18px;
    }

    .card p{
      margin:0 0 12px;
      font-size:14px;
    }

    .widgetWrap{
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      background:rgba(0,0,0,.18);
      padding:10px;
      min-height:460px;
      min-width:0;
    }

    .widgetWrap > div{
      min-width:0;
    }

    @media (max-width: 940px){
      .grid{
        grid-template-columns:1fr;
      }

      .widgetWrap{
        min-height:400px;
      }
    }

    @media (max-width: 560px){
      .wrap{
        padding:14px;
      }

      h1{
        font-size:18px;
      }

      .hero-actions{
        flex-direction:column;
      }

      .hero-actions .btn{
        width:100%;
      }

      .card{
        padding:12px;
      }

      .widgetWrap{
        padding:8px;
        overflow-x:auto;
        overflow-y:hidden;
        -webkit-overflow-scrolling:touch;
      }

      .widgetWrap > div{
        min-width:640px;
      }
    }
  </style>
</head>

<body id="top">
  <div class="wrap">

    <div class="topbar">
      <div>
        <h1>Spiele & Tabellen (FuPa)</h1>
        <p>SG 1a und SG 1b</p>
      </div>
      <a class="btn back-btn" href="index.html#events">← Zurück</a>
    </div>

    <div class="hero">
      <div class="hero-actions">
        <a class="btn" href="#sg1a">SG 1a</a>
        <a class="btn" href="#sg1b">SG 1b</a>
      </div>
    </div>

    <div class="grid">

      <section class="card" id="sg1a">
        <h2>SG 1a</h2>
        <p>Spielplan, Ergebnisse und aktuelle Übersicht.</p>
        <div class="widgetWrap">
          <div id="fp-widget_root-3B7li1Go9Fi25BOMNqJI4xKW9Ei">
            <a href="https://www.fupa.net/club/tsg-bad-koenig" target="_blank" rel="noopener">TSG Bad König auf FuPa</a>
          </div>
        </div>
      </section>

      <section class="card" id="sg1b">
        <h2>SG 1b</h2>
        <p>Spielplan, Ergebnisse und aktuelle Übersicht.</p>
        <div class="widgetWrap">
          <div id="fp-widget_root-3B7m0ZI5PMi51iBPt1sMaKRA2Hg">
            <a href="https://www.fupa.net/club/tsg-bad-koenig" target="_blank" rel="noopener">TSG Bad König auf FuPa</a>
          </div>
        </div>
      </section>

    </div>
  </div>

  <script src="https://widget-api.fupa.net/vendor/widget.js?v1"></script>
</body>
</html>
