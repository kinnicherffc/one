<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FFC Chat</title>

  <style>
    :root{
      --bg:#071428;
      --card:#0c1f3b;
      --text:#eaf2ff;
      --muted:#b9c8e6;
      --line:rgba(255,255,255,.12);
      --accent:#3aa0ff;
      --accent2:#79d4ff;
      --danger:#ff4b4b;
      --success:#2e8b57;
      --radius:16px;
      --shadow:0 18px 60px rgba(0,0,0,.35);
      --max:900px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(900px 500px at 12% 10%, rgba(58,160,255,.18), transparent 60%),
        radial-gradient(700px 420px at 85% 10%, rgba(121,212,255,.12), transparent 55%),
        linear-gradient(180deg, #061126 0%, #050b18 100%);
      color:var(--text);
    }

    .wrap{
      max-width:var(--max);
      margin:auto;
      padding:20px;
    }

    .topbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:18px;
    }

    .toplink{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);
      text-decoration:none;
      font-size:14px;
    }

    .toplink:hover{
      background:rgba(255,255,255,.07);
    }

    h1{
      text-align:center;
      margin:6px 0 20px;
      font-size:28px;
    }

    .box{
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:18px;
      background:linear-gradient(180deg, rgba(12,31,59,.75), rgba(10,24,48,.65));
      margin-bottom:16px;
      box-shadow:var(--shadow);
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:12px;
      border-radius:10px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.25);
      color:var(--text);
      box-sizing:border-box;
      font-size:15px;
    }

    input::placeholder{
      color:#b9c8e6;
    }

    button{
      padding:12px 14px;
      border:none;
      border-radius:10px;
      background:#3aa0ff;
      color:white;
      cursor:pointer;
      width:100%;
      font-size:15px;
      font-weight:600;
    }

    button:hover{
      opacity:.94;
    }

    .authButtons{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:18px;
      margin-top:6px;
    }

    .authButtons button{
      margin:0;
      min-height:48px;
    }

    #chat{
      height:420px;
      overflow-y:auto;
      background:#08101f;
      padding:12px;
      border-radius:12px;
      margin-bottom:12px;
      border:1px solid var(--line);
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .msg{
      max-width:80%;
      padding:10px 12px;
      border-radius:14px;
      line-height:1.45;
      font-size:14px;
      word-break:break-word;
      position:relative;
    }

    .msg.own{
      align-self:flex-end;
      background:#1f6feb;
      color:#fff;
      border-bottom-right-radius:4px;
    }

    .msg.other{
      align-self:flex-start;
      background:#1b2c4b;
      color:#fff;
      border-bottom-left-radius:4px;
    }

    .msgHeader{
      font-size:12px;
      opacity:.88;
      margin-bottom:4px;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .msgTime{
      font-size:11px;
      opacity:.8;
    }

    .delete{
      color:#ffb3b3;
      cursor:pointer;
      font-size:12px;
      margin-left:auto;
    }

    .logout{
      background:var(--danger);
      margin-top:10px;
    }

    .error{
      display:none;
      background:#4a1010;
      border:1px solid #a94442;
      color:#ffd5d5;
      padding:10px;
      border-radius:8px;
      margin-bottom:12px;
      font-size:14px;
    }

    .success{
      display:none;
      background:#103d22;
      border:1px solid var(--success);
      color:#d7ffe5;
      padding:10px;
      border-radius:8px;
      margin-bottom:12px;
      font-size:14px;
    }

    .hint{
      font-size:13px;
      color:var(--muted);
      margin:0 0 14px;
      line-height:1.5;
    }

    .chatActions{
      display:grid;
      grid-template-columns: 1fr;
      gap:10px;
    }

    .quickLinks{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
      margin-top:8px;
    }

    .quickLinks a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 14px;
      border-radius:10px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);
      text-decoration:none;
      font-size:14px;
      font-weight:600;
      text-align:center;
      min-height:48px;
    }

    .quickLinks a:hover{
      background:rgba(255,255,255,.07);
    }

    .subhead{
      margin:0 0 8px;
      font-size:18px;
    }

    .emojiBar{
      display:flex;
      gap:8px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    .emojiBtn{
      width:auto;
      min-width:44px;
      padding:8px 10px;
      font-size:18px;
      border-radius:10px;
      background:#163052;
      margin:0;
    }

    .metaBar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
      font-size:13px;
      color:var(--muted);
    }

    @media (max-width: 640px){
      .wrap{padding:14px}
      h1{font-size:24px}
      .authButtons{grid-template-columns:1fr 1fr; gap:14px}
      .quickLinks{grid-template-columns:1fr 1fr; gap:10px}
      #chat{height:360px}
      .msg{max-width:88%}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <a class="toplink" href="index.html">← Zurück zur Startseite</a>
    </div>

    <h1>FFC Fanclub Chat</h1>

    <div class="quickLinks" style="margin-bottom:16px;">
      <a href="liveticker.html">📊 Live Ticker</a>
      <a href="livevideo.html">📺 Live Video</a>
    </div>

    <div id="errorBox" class="error"></div>
    <div id="successBox" class="success"></div>

    <div id="authBox" class="box">
      <h3 class="subhead">Login / Registrierung</h3>
      <p class="hint">Nur angemeldete Nutzer können lesen und schreiben.</p>

      <input id="name" type="text" placeholder="Name / Anzeigename">
      <input id="email" type="email" placeholder="E-Mail">
      <input id="password" type="password" placeholder="Passwort">

      <div class="authButtons">
        <button id="loginBtn" type="button">Login</button>
        <button id="registerBtn" type="button">Registrieren</button>
      </div>
    </div>

    <div id="chatBox" class="box" style="display:none;">
      <h3 class="subhead">Chat</h3>

      <div class="quickLinks" style="margin-bottom:14px;">
        <a href="liveticker.html">📊 Live Ticker</a>
        <a href="livevideo.html">📺 Live Video</a>
      </div>

      <div class="metaBar">
        <div>Online: <span id="onlineUsers">0</span></div>
        <div>Es werden die letzten 100 Nachrichten angezeigt.</div>
      </div>

      <div id="chat"></div>

      <div class="emojiBar">
        <button type="button" class="emojiBtn" data-emoji="⚽">⚽</button>
        <button type="button" class="emojiBtn" data-emoji="🔥">🔥</button>
        <button type="button" class="emojiBtn" data-emoji="👏">👏</button>
        <button type="button" class="emojiBtn" data-emoji="💙">💙</button>
        <button type="button" class="emojiBtn" data-emoji="🎉">🎉</button>
        <button type="button" class="emojiBtn" data-emoji="😂">😂</button>
      </div>

      <div class="chatActions">
        <input id="msgInput" type="text" placeholder="Nachricht eingeben...">
        <button id="sendBtn" type="button">Senden</button>
        <button id="logoutBtn" class="logout" type="button">Logout</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      onAuthStateChanged,
      signOut,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      getFirestore,
      collection,
      addDoc,
      query,
      orderBy,
      onSnapshot,
      deleteDoc,
      doc,
      setDoc,
      serverTimestamp,
      limit,
      deleteField
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDShDkLcHwjsnLuzlEhUeXJFDoSyjdc970",
      authDomain: "ffc-chat-340e9.firebaseapp.com",
      projectId: "ffc-chat-340e9",
      storageBucket: "ffc-chat-340e9.firebasestorage.app",
      messagingSenderId: "297409812256",
      appId: "1:297409812256:web:f608c0960103bfd8e42945"
    };

    const ADMIN_EMAIL = "info@kinnicherffc.de"; // <-- HIER deine Admin-E-Mail einsetzen

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const authBox = document.getElementById("authBox");
    const chatBox = document.getElementById("chatBox");
    const chatDiv = document.getElementById("chat");
    const onlineUsersEl = document.getElementById("onlineUsers");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const nameInput = document.getElementById("name");
    const msgInput = document.getElementById("msgInput");
    const loginBtn = document.getElementById("loginBtn");
    const registerBtn = document.getElementById("registerBtn");
    const sendBtn = document.getElementById("sendBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const errorBox = document.getElementById("errorBox");
    const successBox = document.getElementById("successBox");

    let unsubscribeMessages = null;
    let unsubscribePresence = null;

    function showError(message) {
      errorBox.textContent = message;
      errorBox.style.display = "block";
      successBox.style.display = "none";
    }

    function showSuccess(message) {
      successBox.textContent = message;
      successBox.style.display = "block";
      errorBox.style.display = "none";
    }

    function clearMessages() {
      errorBox.style.display = "none";
      successBox.style.display = "none";
    }

    function mapFirebaseError(code) {
      switch (code) {
        case "auth/invalid-email":
          return "Die E-Mail-Adresse ist ungültig.";
        case "auth/missing-password":
          return "Bitte ein Passwort eingeben.";
        case "auth/weak-password":
          return "Das Passwort ist zu schwach. Bitte mindestens 6 Zeichen verwenden.";
        case "auth/email-already-in-use":
          return "Diese E-Mail ist bereits registriert.";
        case "auth/invalid-credential":
        case "auth/wrong-password":
        case "auth/user-not-found":
          return "Login fehlgeschlagen. E-Mail oder Passwort stimmt nicht.";
        case "auth/operation-not-allowed":
          return "E-Mail/Passwort-Login ist in Firebase noch nicht aktiviert.";
        case "auth/network-request-failed":
          return "Netzwerkfehler. Bitte Verbindung prüfen.";
        default:
          return `Firebase-Fehler: ${code}`;
      }
    }

    function formatTime(value) {
      const date = new Date(value);
      return date.toLocaleString("de-DE", {
        day: "2-digit",
        month: "2-digit",
        year: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    async function login() {
      clearMessages();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showError("Bitte E-Mail und Passwort eingeben.");
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showSuccess("Login erfolgreich.");
      } catch (error) {
        showError(mapFirebaseError(error.code));
        console.error("Login error:", error);
      }
    }

    async function register() {
      clearMessages();

      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const name = nameInput.value.trim();

      if (!email || !password) {
        showError("Bitte E-Mail und Passwort eingeben.");
        return;
      }

      if (password.length < 6) {
        showError("Das Passwort muss mindestens 6 Zeichen lang sein.");
        return;
      }

      try {
        const userCred = await createUserWithEmailAndPassword(auth, email, password);

        if (name) {
          await updateProfile(userCred.user, {
            displayName: name
          });
        }

        showSuccess("Registrierung erfolgreich. Du bist jetzt eingeloggt.");
      } catch (error) {
        showError(mapFirebaseError(error.code));
        console.error("Register error:", error);
      }
    }

    async function logout() {
      clearMessages();

      try {
        const user = auth.currentUser;
        if (user) {
          await setDoc(doc(db, "presence", user.uid), {
            active: false,
            name: user.displayName || user.email,
            uid: user.uid,
            updatedAt: serverTimestamp()
          }, { merge: true });
        }

        await signOut(auth);
        showSuccess("Logout erfolgreich.");
      } catch (error) {
        showError("Logout fehlgeschlagen.");
        console.error("Logout error:", error);
      }
    }

    async function sendMessage() {
      clearMessages();

      const text = msgInput.value.trim();
      const user = auth.currentUser;

      if (!user) {
        showError("Du musst eingeloggt sein, um zu schreiben.");
        return;
      }

      if (!text) {
        showError("Bitte zuerst eine Nachricht eingeben.");
        return;
      }

      try {
        await addDoc(collection(db, "messages"), {
          text,
          user: user.displayName || user.email,
          uid: user.uid,
          time: Date.now()
        });

        msgInput.value = "";
      } catch (error) {
        showError("Nachricht konnte nicht gesendet werden.");
        console.error("Send error:", error);
      }
    }

    function loadMessages() {
      if (unsubscribeMessages) {
        unsubscribeMessages();
      }

      const q = query(
        collection(db, "messages"),
        orderBy("time", "desc"),
        limit(100)
      );

      unsubscribeMessages = onSnapshot(q, (snapshot) => {
        chatDiv.innerHTML = "";

        const docs = [];
        snapshot.forEach((d) => docs.push(d));
        docs.reverse();

        docs.forEach((d) => {
          const m = d.data();
          const isOwn = auth.currentUser && m.uid === auth.currentUser.uid;
          const isAdmin = auth.currentUser && auth.currentUser.email === ADMIN_EMAIL;

          const msg = document.createElement("div");
          msg.className = `msg ${isOwn ? "own" : "other"}`;

          msg.innerHTML = `
            <div class="msgHeader">
              <span>${m.user}</span>
              <span class="msgTime">${formatTime(m.time)}</span>
              ${isAdmin ? `<span class="delete" data-id="${d.id}">❌</span>` : ""}
            </div>
            <div>${m.text}</div>
          `;

          chatDiv.appendChild(msg);
        });

        chatDiv.querySelectorAll(".delete").forEach(btn => {
          btn.addEventListener("click", async () => {
            await deleteDoc(doc(db, "messages", btn.dataset.id));
          });
        });

        chatDiv.scrollTop = chatDiv.scrollHeight;
      }, (error) => {
        showError("Nachrichten konnten nicht geladen werden.");
        console.error("Snapshot error:", error);
      });
    }

    async function setPresence(user) {
      if (!user) return;

      await setDoc(doc(db, "presence", user.uid), {
        active: true,
        name: user.displayName || user.email,
        uid: user.uid,
        updatedAt: serverTimestamp()
      }, { merge: true });
    }

    function watchPresence() {
      if (unsubscribePresence) {
        unsubscribePresence();
      }

      unsubscribePresence = onSnapshot(collection(db, "presence"), (snap) => {
        let activeCount = 0;
        snap.forEach((d) => {
          const data = d.data();
          if (data.active === true) activeCount++;
        });
        onlineUsersEl.textContent = activeCount;
      });
    }

    loginBtn.addEventListener("click", login);
    registerBtn.addEventListener("click", register);
    logoutBtn.addEventListener("click", logout);
    sendBtn.addEventListener("click", sendMessage);

    msgInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        sendMessage();
      }
    });

    document.querySelectorAll(".emojiBtn").forEach(btn => {
      btn.addEventListener("click", () => {
        msgInput.value += btn.dataset.emoji;
        msgInput.focus();
      });
    });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        authBox.style.display = "none";
        chatBox.style.display = "block";
        clearMessages();
        await setPresence(user);
        loadMessages();
        watchPresence();
      } else {
        authBox.style.display = "block";
        chatBox.style.display = "none";
        if (unsubscribeMessages) {
          unsubscribeMessages();
          unsubscribeMessages = null;
        }
        if (unsubscribePresence) {
          unsubscribePresence();
          unsubscribePresence = null;
        }
      }
    });
  </script>
</body>
</html>
