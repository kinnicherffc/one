<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FFC Chat</title>

  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background:#071428;
      color:white;
    }

    .wrap {
      max-width:800px;
      margin:auto;
      padding:20px;
    }

    h1 { text-align:center; }

    .box {
      border:1px solid #2a3f6a;
      border-radius:12px;
      padding:15px;
      background:#0c1f3b;
      margin-bottom:15px;
    }

    input {
      width:100%;
      padding:10px;
      margin-bottom:10px;
      border-radius:8px;
      border:none;
    }

    button {
      padding:10px;
      border:none;
      border-radius:8px;
      background:#3aa0ff;
      color:white;
      cursor:pointer;
      width:100%;
    }

    #chat {
      height:300px;
      overflow-y:auto;
      background:#000;
      padding:10px;
      border-radius:10px;
      margin-bottom:10px;
    }

    .msg {
      margin-bottom:8px;
      font-size:14px;
    }

    .user {
      color:#79d4ff;
      font-weight:bold;
    }

    .logout {
      background:#ff4b4b;
      margin-top:10px;
    }
  </style>
</head>

<body>
<div class="wrap">

  <h1>FFC Fanclub Chat</h1>

  <!-- LOGIN -->
  <div id="authBox" class="box">
    <h3>Login / Registrierung</h3>
    <input id="email" type="email" placeholder="E-Mail">
    <input id="password" type="password" placeholder="Passwort">

    <button onclick="login()">Login</button>
    <button onclick="register()">Registrieren</button>
  </div>

  <!-- CHAT -->
  <div id="chatBox" class="box" style="display:none;">
    <div id="chat"></div>

    <input id="msgInput" placeholder="Nachricht eingeben...">
    <button onclick="sendMessage()">Senden</button>

    <button class="logout" onclick="logout()">Logout</button>
  </div>

</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { 
    getAuth, 
    signInWithEmailAndPassword, 
    createUserWithEmailAndPassword, 
    onAuthStateChanged,
    signOut 
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  import { 
    getFirestore, 
    collection, 
    addDoc, 
    query, 
    orderBy, 
    onSnapshot 
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // 🔥 DEIN CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyDShDkLcHwjsnLuzlEhUeXJFDoSyjdc970",
    authDomain: "ffc-chat-340e9.firebaseapp.com",
    projectId: "ffc-chat-340e9",
    storageBucket: "ffc-chat-340e9.firebasestorage.app",
    messagingSenderId: "297409812256",
    appId: "1:297409812256:web:f608c0960103bfd8e42945"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const chatDiv = document.getElementById("chat");

  // LOGIN
  window.login = async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    await signInWithEmailAndPassword(auth, email, password);
  };

  // REGISTER
  window.register = async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    await createUserWithEmailAndPassword(auth, email, password);
  };

  // LOGOUT
  window.logout = async () => {
    await signOut(auth);
  };

  // USER STATE
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("authBox").style.display = "none";
      document.getElementById("chatBox").style.display = "block";
      loadMessages();
    } else {
      document.getElementById("authBox").style.display = "block";
      document.getElementById("chatBox").style.display = "none";
    }
  });

  // SEND MESSAGE
  window.sendMessage = async () => {
    const text = document.getElementById("msgInput").value;
    if (!text) return;

    await addDoc(collection(db, "messages"), {
      text: text,
      user: auth.currentUser.email,
      time: Date.now()
    });

    document.getElementById("msgInput").value = "";
  };

  // LOAD MESSAGES (LIVE)
  function loadMessages() {
    const q = query(collection(db, "messages"), orderBy("time"));

    onSnapshot(q, (snapshot) => {
      chatDiv.innerHTML = "";
      snapshot.forEach(doc => {
        const m = doc.data();
        chatDiv.innerHTML += `
          <div class="msg">
            <span class="user">${m.user}:</span> ${m.text}
          </div>
        `;
      });
      chatDiv.scrollTop = chatDiv.scrollHeight;
    });
  }
</script>
</body>
</html>
