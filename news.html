<!doctype html>
<html lang="de" id="top">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>News | Kinnicher FFC</title>

<style>
:root{
  --bg:#071428;
  --card:#0c1f3b;
  --text:#eaf2ff;
  --muted:#b9c8e6;
  --line:rgba(255,255,255,.12);
  --accent:#3aa0ff;
  --radius:18px;
  --shadow:0 18px 60px rgba(0,0,0,.35);
  --max:1200px;
}

*{box-sizing:border-box}

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  font-family:system-ui, Arial, sans-serif;
  background:linear-gradient(#061126,#050b18);
  color:var(--text);
}

.wrap{
  max-width:var(--max);
  margin:auto;
  padding:20px;
}

.header{
  position:sticky;
  top:0;
  z-index:100;
  background:#050b18;
  border-bottom:1px solid var(--line);
}

.topbar{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  justify-content:space-between;
  align-items:center;
}

.topbar h2{
  margin:0;
  font-size:28px;
  line-height:1.1;
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:10px 14px;
  min-height:42px;
  border-radius:12px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.04);
  color:var(--text);
  text-decoration:none;
  transition:.2s ease;
  white-space:nowrap;
}

.btn:hover{
  background:rgba(58,160,255,.16);
  border-color:rgba(58,160,255,.5);
  color:#fff;
}

.jumpNav{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  margin-top:20px;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
  min-height:650px;
}

.card h2{
  margin:0;
  padding:12px;
  font-size:16px;
  border-bottom:1px solid var(--line);
}

/* EMBED */
.embed{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
}

/* FACEBOOK */
.fb iframe{
  width:100%;
  max-width:500px;
  height:100%;
  min-height:600px;
  border:0;
}

/* INSTAGRAM */
.ig{
  padding:10px;
}

/* POSTS */
.posts{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  margin-top:20px;
}

.post{
  min-height:650px;
  background:#fff;
  border-radius:var(--radius);
  overflow:hidden;
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}

.post iframe{
  width:100%;
  max-width:500px;
  height:100%;
  min-height:600px;
  border:0;
}

/* TABLET */
@media (max-width:900px){
  .grid,
  .posts{
    grid-template-columns:1fr;
  }

  .jumpNav{
    width:100%;
  }

  .topbar{
    align-items:flex-start;
  }
}

/* MOBILE */
@media (max-width:640px){
  .wrap{
    padding:12px;
  }

  .topbar{
    gap:10px;
  }

  .topbar h2{
    font-size:22px;
  }

  .jumpNav{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    width:100%;
  }

  .btn{
    width:100%;
    min-height:40px;
    padding:9px 10px;
    font-size:14px;
    white-space:normal;
    text-align:center;
  }

  .card,
  .post{
    min-height:auto;
  }

  .card h2{
    font-size:15px;
    padding:10px 12px;
  }

  .embed{
    min-height:auto;
  }

  .fb iframe,
  .post iframe{
    max-width:100%;
    min-height:0;
    height:420px;
  }

  .ig{
    padding:8px;
  }
}

/* SEHR KLEINE HANDYS */
@media (max-width:420px){
  .topbar h2{
    font-size:20px;
  }

  .jumpNav{
    grid-template-columns:1fr;
  }

  .fb iframe,
  .post iframe{
    height:360px;
  }
}
</style>
</head>
